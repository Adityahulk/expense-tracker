name: expense_tracker
description: "Offline expense tracker for material expenses."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # State management
  flutter_riverpod: ^2.4.10

  # Local database
  sqflite: ^2.3.2
  path: ^1.8.3
  path_provider: ^2.1.2

  # Excel export
  excel: ^4.0.2

  # Files / opening
  open_filex: ^4.4.0
  share_plus: ^7.2.2

  # System file save dialog (Android SAF)
  flutter_file_dialog: ^3.0.2

  # Backup zip archive
  archive: ^3.4.10

  # Secure storage for passcode hashes (Android Keystore-backed)
  flutter_secure_storage: ^9.0.0

  # PBKDF2 / hashing
  crypto: ^3.0.3

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  sqflite_common_ffi: ^2.3.2  # for unit tests on desktop

flutter:
  uses-material-design: true
